// android/settings.gradle — FIXED & UPDATED FOR AGP 8.6.1 / Kotlin 1.9.24

pluginManagement {
    // Resolve Flutter SDK path from local.properties
    def flutterSdkPath = {
        def props = new Properties()
        file("local.properties").withInputStream { props.load(it) }
        def path = props.getProperty("flutter.sdk")
        assert path != null && path.trim(), "flutter.sdk not set in local.properties"
        return path
    }()

    // Use Flutter's Gradle integration
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    // Let Flutter manage AGP/Kotlin plugin versions to match the Flutter SDK.
    // Do NOT pin com.android.application or org.jetbrains.kotlin.android here.
}

// Apply the Flutter settings plugin and declare Android/Kotlin plugin versions
plugins {
    id("dev.flutter.flutter-plugin-loader") version "1.0.0"
    id("com.android.application") version "8.9.1" apply false
    id("org.jetbrains.kotlin.android") version "2.1.0" apply false
}

// Enforce centralized repositories for all subprojects
dependencyResolutionManagement {
    // Flutter's Gradle plugin adds required Maven repos at the project level
    // (e.g., for engine artifacts). Using FAIL_ON_PROJECT_REPOS conflicts with that.
    // Prefer settings-defined repos but allow project repos added by plugins.
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        // Flutter engine artifacts (primary)
        maven { url = uri("https://storage.googleapis.com/download.flutter.io") }
        // Optional mirror if primary is blocked
        maven { url = uri("https://storage.flutter-io.cn") }
        // Legacy redirect used by some toolchains
        maven { url = uri("https://download.flutter.io") }
    }
}

rootProject.name = "android"

// App module
include(":app")
