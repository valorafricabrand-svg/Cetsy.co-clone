// android/settings.gradle — FIXED & UPDATED FOR AGP 8.6.1 / Kotlin 1.9.24

pluginManagement {
    // Resolve Flutter SDK path from local.properties
    def flutterSdkPath = {
        def props = new Properties()
        file("local.properties").withInputStream { props.load(it) }
        def path = props.getProperty("flutter.sdk")
        assert path != null && path.trim(), "flutter.sdk not set in local.properties"
        return path
    }()

    // Use Flutter's Gradle integration
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    // Pin plugin versions here (AGP & Kotlin)
    plugins {
        id("com.android.application") version "8.7.2"
        id("org.jetbrains.kotlin.android") version "2.1.0"
        id("dev.flutter.flutter-plugin-loader") version "1.0.0"
        // If you use Google services, also pin here:
        // id("com.google.gms.google-services") version "4.4.2"
    }
}

// Enforce centralized repositories for all subprojects
dependencyResolutionManagement {
    // Flutter's Gradle plugin adds required Maven repos at the project level
    // (e.g., for engine artifacts). Using FAIL_ON_PROJECT_REPOS conflicts with that.
    // Prefer settings-defined repos but allow project repos added by plugins.
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()

        // Ensure Flutter engine artifacts resolve properly
        exclusiveContent {
            forRepository {
                maven { url = uri("https://storage.googleapis.com/download.flutter.io") }
            }
            filter {
                includeGroup("io.flutter")
                includeGroup("com.google.flutter")
            }
        }
        // Optional mirror (China); Gradle will try in order
        exclusiveContent {
            forRepository {
                maven { url = uri("https://storage.flutter-io.cn") }
            }
            filter {
                includeGroup("io.flutter")
                includeGroup("com.google.flutter")
            }
        }
        // Leave plugin-added repositories (from Flutter) allowed at project level.
    }
}

rootProject.name = "android"

// App module
include(":app")
