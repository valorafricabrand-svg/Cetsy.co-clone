// android/app/build.gradle — FIXED for AGP 8.6.1 / Kotlin 1.9.24 / Gradle 8.7

plugins {
    id "com.android.application" version "8.6.1"
    // Use the modern Kotlin plugin ID (matches settings.gradle pluginManagement)
    id "org.jetbrains.kotlin.android" version "1.9.24"
    // Apply the official Flutter Gradle plugin (declarative)
    id "dev.flutter.flutter-gradle-plugin"
}

// Use repositories defined centrally in settings.gradle

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace "com.example.cetsy_starter"          // TODO: replace with your real package (e.g., com.isaiah.kikuyu_bible)

    // You can keep using Flutter’s exported values, but ensure they resolve to SDK 34.
    // If your Flutter export is older, uncomment the explicit lines below.
    compileSdk = (flutter.hasProperty('compileSdkVersion') ? flutter.compileSdkVersion : 34)
    ndkVersion = flutter.ndkVersion

    defaultConfig {
        applicationId "com.example.cetsy_starter"  // TODO: keep in sync with `namespace`
        minSdk = (flutter.hasProperty('minSdkVersion') ? flutter.minSdkVersion : 21)
        targetSdk = (flutter.hasProperty('targetSdkVersion') ? flutter.targetSdkVersion : 34)
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        multiDexEnabled true
        vectorDrawables {
            useSupportLibrary = true
        }
    }

    buildTypes {
        release {
            // TODO: set up your real signing config for release builds
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            // keep defaults
        }
    }

    // AGP 8.x requires Java 17
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Kotlin toolchain 17 to match AGP/Gradle/JDK
    kotlin {
        jvmToolchain(17)
    }

    packaging {
        resources {
            excludes += ["/META-INF/{AL2.0,LGPL2.1}", "META-INF/DEPENDENCIES"]
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Rely on the Kotlin Gradle plugin to add the correct stdlib

    // Common AndroidX libs (optional but useful)
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"

    // Multidex support if needed
    implementation "androidx.multidex:multidex:2.0.1"
}
