// Updated for Flutter 3.35 / AGP 8.9.x / Kotlin 2.1.x

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // Official Flutter Gradle plugin
    id "dev.flutter.flutter-gradle-plugin"
}

// Use repositories defined centrally in settings.gradle

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}
def hasReleaseSigningConfig =
        keystorePropertiesFile.exists() &&
        keystoreProperties["storeFile"] &&
        keystoreProperties["storePassword"] &&
        keystoreProperties["keyAlias"] &&
        keystoreProperties["keyPassword"]
def requiresReleaseSigning =
        gradle.startParameter.taskNames.any { taskName ->
            taskName.toLowerCase().contains("release")
        }

android {
    namespace "com.cetsy.co.cetsy_starter" // TODO: replace with your real package

    // Prefer values exported by Flutter; fall back to explicit SDK 34
    compileSdk = (flutter.hasProperty('compileSdkVersion') ? flutter.compileSdkVersion : 34)
    ndkVersion = flutter.ndkVersion

    defaultConfig {
        applicationId "com.cetsy.co.cetsy_starter" // Keep in sync with `namespace`
        minSdk = (flutter.hasProperty('minSdkVersion') ? flutter.minSdkVersion : 21)
        targetSdk = (flutter.hasProperty('targetSdkVersion') ? flutter.targetSdkVersion : 34)
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        multiDexEnabled true
        vectorDrawables {
            useSupportLibrary = true
        }
    }

    signingConfigs {
        release {
            if (hasReleaseSigningConfig) {
                storeFile rootProject.file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            if (hasReleaseSigningConfig) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            // keep defaults
        }
    }

    // AGP 8.x requires Java 17
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Use Kotlin toolchain 17 to match AGP/Gradle/JDK
    kotlin {
        jvmToolchain(17)
    }

    packaging {
        resources {
            excludes += ["/META-INF/{AL2.0,LGPL2.1}", "META-INF/DEPENDENCIES"]
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Common AndroidX libs (optional but useful)
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"

    // Multidex support if needed
    implementation "androidx.multidex:multidex:2.0.1"
}

if (requiresReleaseSigning && !hasReleaseSigningConfig) {
    throw new GradleException(
            "Missing Android release signing config. " +
            "Create android/key.properties (see README Play Store signing section)."
    )
}
