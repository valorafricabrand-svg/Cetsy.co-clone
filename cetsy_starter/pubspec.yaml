name: cetsy_webview
description: Flutter WebView wrapper for https://cetsy.co with enhanced UX and web fallback.
publish_to: "none"
version: 1.1.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # WebView core + web implementation
  webview_flutter: ^4.8.0
  webview_flutter_web: ^0.2.3+4
  # Platform-specific extras (Android download/upload hooks)
  webview_flutter_android: ^4.10.0
  webview_flutter_wkwebview: ^3.13.0

  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  share_plus: ^11.1.0
  file_picker: ^10.3.2
  package_info_plus: ^8.0.2

  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/app_icons/elephant_icon_1024.png
    background_color: "#111111"
    theme_color: "#2563EB"

  # Provide a base image for BOTH platforms (satisfies the plugin requirement)
  image_path: assets/app_icons/elephant_icon_1024.png

  # Android adaptive icons (Play’s modern shape-masking)
  adaptive_icon_foreground: assets/app_icons/elephant_icon_1024.png
  adaptive_icon_background: "#111111"

  # Nice-to-haves
  min_sdk_android: 21
  remove_alpha_ios: true

# Native splash configuration
flutter_native_splash:
  # Light theme background and image
  color: "#2563EB"            # brand blue background
  image: assets/app_icons/cetsy_icon_1024.png

  # Dark theme background and image
  color_dark: "#0B1220"       # dark background
  image_dark: assets/app_icons/cetsy_icon_1024.png

  # Android 12 requires separate section
  android_12:
    color: "#2563EB"
    color_dark: "#0B1220"
    image: assets/app_icons/cetsy_icon_512.png
    image_dark: assets/app_icons/cetsy_icon_512.png

  android_gravity: center
  ios_content_mode: center
  android: true
  ios: true
  web: false
