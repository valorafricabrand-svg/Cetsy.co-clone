name: cetsy_webview
description: Flutter WebView wrapper for https://cetsy.co with shared web support.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # WebView (Android/iOS)
  webview_flutter: ^4.8.0

  # Web implementation (Chrome/Edge/Safari)
  # ^0.2.3+4 is the compatible line for many stable setups
  webview_flutter_web: ^0.2.3+4

  # External intents & web redirects
  url_launcher: ^6.3.0

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
