<!DOCTYPE html>
<html>
  <head>
    <base href="/" />
    <meta charset="UTF-8" />
    <meta name="description" content="Cetsy WebView wrapper" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2563EB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cetsy" />
    <title>Cetsy</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #eef2ff;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #dbeafe, #eef2ff 45%, #f8fafc 100%);
        z-index: 9999;
      }
      #boot-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        color: #1e3a8a;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 600;
      }
      #boot-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(37, 99, 235, 0.25);
        border-top-color: #2563eb;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div id="boot-card">
        <img src="icons/Icon-192.png" alt="Cetsy" width="64" height="64" />
        <div>Starting Cetsy...</div>
        <div id="boot-spinner"></div>
      </div>
    </div>
    <script>
      window.addEventListener("flutter-first-frame", function () {
        var boot = document.getElementById("boot");
        if (boot) boot.remove();
      });
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
